name: Recovery Build - OrangeFox

on:
  workflow_dispatch:
    inputs:
      SYNC_URL:
        description: 'SYNC_URL'
        required: true
        default: 'https://gitlab.com/OrangeFox/sync.git'
      MANIFEST_BRANCH:
        description: 'OrangeFox Branch'
        required: true
        default: '12.1'
        type: choice
        options:
        - '14.1'
        - '12.1'
        - '11.0'
      DEVICE_TREE_URL:
        description: 'DEVICE_TREE_URL'
        required: true
        default: 'https://github.com/dazui-py/A145R-OFox'
      DEVICE_TREE_BRANCH:
        description: 'DEVICE_TREE_BRANCH'
        required: true
        default: 'main'
      DEVICE_PATH:
        description: 'DEVICE_PATH'
        required: true
        default: 'device/samsung/a14m'
      DEVICE_NAME:
        description: 'DEVICE_NAME'
        required: true
        default: 'a14m'
      BUILD_TARGET:
        description: 'BUILD_TARGET'
        required: true
        default: 'recovery'
        type: choice
        options:
        - recovery
        - boot
        - vendorboot
      RECOVERY_TAR:
        description: 'Release recovery.tar For Samsung devices'
        required: false
        default: true
        type: boolean
      RECOVERY_INSTALLER:
        description: 'Include recovery installer zip'
        type: boolean
        required: true
        default: true

jobs:
  build:
    name: Build OFRP by ${{ github.actor }}
    if: github.event.repository.owner.id == github.event.sender.id
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:

    - name: Check Out
      uses: actions/checkout@v4

    - name: Cleanup
      uses: rokibhasansagar/slimhub_actions@main

    - name: Initialize workspace
      run: |
        mkdir workspace
        cd workspace
        echo "workspace-folder=$(pwd)" >> $GITHUB_OUTPUT
      id: pwd

    - name: Prepare the build environment
      run: |
        sudo apt update && sudo apt upgrade -y
        DEBIAN_FRONTEND=noninteractive sudo apt install -yq \
            linux-modules-extra-$(uname -r) \
            git python3 tar aria2
        git clone https://gitlab.com/OrangeFox/misc/scripts
        cd scripts
        sudo bash setup/android_build_env.sh
        sed -i 's/cd -/cd ../g' setup/install_android_sdk.sh
        sudo bash setup/install_android_sdk.sh
      working-directory: ${{ steps.pwd.outputs.workspace-folder }}

    - name: Set Swap Space
      uses: pierotofy/set-swap-space@master
      with:
        swap-size-gb: 24

    - name: Setup SSH Keys
      if: ${{ startsWith(github.event.inputs.SYNC_URL, 'git@github.com') ||
          startsWith(github.event.inputs.DEVICE_TREE_URL, 'git@github.com') }}
      uses: webfactory/ssh-agent@v0.9.0
      with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

    - name: Sync OrangeFox sources
      run: |
        cd ${{ steps.pwd.outputs.workspace-folder }}
        git config --global user.name "Github Actions"
        git config --global user.email "actions@github.com"
        git clone ${{ github.event.inputs.SYNC_URL }}
        cd sync
        ./orangefox_sync.sh --branch ${{ github.event.inputs.MANIFEST_BRANCH }} --path ${{ steps.pwd.outputs.workspace-folder }}/fox_${{ github.event.inputs.MANIFEST_BRANCH }}
      working-directory: ${{ steps.pwd.outputs.workspace-folder }}

    - name: Clone device tree
      run: |
        cd ${{ steps.pwd.outputs.workspace-folder }}/fox_${{ github.event.inputs.MANIFEST_BRANCH }}
        git clone ${{ github.event.inputs.DEVICE_TREE_URL }} -b ${{ github.event.inputs.DEVICE_TREE_BRANCH }} ./${{ github.event.inputs.DEVICE_PATH }}
        echo "COMMIT_ID=$(git -C ./${{ github.event.inputs.DEVICE_PATH }} rev-parse --short HEAD)" >> $GITHUB_ENV
      working-directory: ${{ steps.pwd.outputs.workspace-folder }}

    - name: Check Manifest Branch (Lunch Logic)
      uses: haya14busa/action-cond@v1
      id: fox_branch
      with:
        cond: ${{ github.event.inputs.MANIFEST_BRANCH == '11.0' || github.event.inputs.MANIFEST_BRANCH == '12.1' }}
        if_true: lunch twrp_${{ github.event.inputs.DEVICE_NAME }}-eng && make clean && mka adbd ${{ github.event.inputs.BUILD_TARGET }}image -j$(nproc --all)
        if_false: lunch omni_${{ github.event.inputs.DEVICE_NAME }}-eng && make clean && mka ${{ github.event.inputs.BUILD_TARGET }}image -j$(nproc --all)

    - name: Building recovery
      run: |
        cd ${{ steps.pwd.outputs.workspace-folder }}/fox_${{ github.event.inputs.MANIFEST_BRANCH }}
        source build/envsetup.sh
        export ALLOW_MISSING_DEPENDENCIES=true
        ${{ steps.fox_branch.outputs.value }}
      working-directory: ${{ steps.pwd.outputs.workspace-folder }}
      continue-on-error: true

    - name: Prepare Artifacts
      run: |
        OUT_PATH="${{ steps.pwd.outputs.workspace-folder }}/fox_${{ github.event.inputs.MANIFEST_BRANCH }}/out/target/product/${{ github.event.inputs.DEVICE_NAME }}"
        echo "FILE_PATH=$OUT_PATH" >> $GITHUB_ENV
        echo "BUILD_DATE=$(date +%Y%m%d)" >> $GITHUB_ENV
        
        cd $OUT_PATH
        # Renomear para facilitar scripts posteriores
        if [ -f OrangeFox*.img ]; then
           mv OrangeFox*.img ${{ github.event.inputs.BUILD_TARGET }}.img
           echo "IMG_FOUND=true" >> $GITHUB_ENV
        fi

    - name: Include Recovery Installer
      if: github.event.inputs.RECOVERY_INSTALLER == 'true' && env.IMG_FOUND == 'true'
      run: |
        cd ${{ env.FILE_PATH }}
        wget https://github.com/kinguser981/recovery-installer/releases/download/11256427880/recovery-installer.zip
        zip -ur recovery-installer.zip ${{ github.event.inputs.BUILD_TARGET }}.img
      continue-on-error: true
        
    - name: Recovery to tar for Samsung devices
      if: github.event.inputs.RECOVERY_TAR == 'true' && env.IMG_FOUND == 'true'
      run: |
        cd ${{ env.FILE_PATH }}
        tar -cvf ${{ github.event.inputs.DEVICE_NAME }}_${{ github.event.inputs.BUILD_TARGET }}.tar ${{ github.event.inputs.BUILD_TARGET }}.img
      continue-on-error: true

    - name: Upload to Release
      uses: softprops/action-gh-release@v2
      with:
        files: |
          ${{ env.FILE_PATH }}/${{ github.event.inputs.BUILD_TARGET }}.img
          ${{ env.FILE_PATH }}/*.tar
          ${{ env.FILE_PATH }}/recovery-installer.zip
          ${{ env.FILE_PATH }}/OrangeFox*.zip
        name: OrangeFox Unofficial ${{ github.event.inputs.DEVICE_NAME }} - ${{ env.BUILD_DATE }}
        tag_name: ${{ github.run_id }}
        body: |
          **Device:** ${{ github.event.inputs.DEVICE_NAME }} (a14m)
          **Manifest:** ${{ github.event.inputs.MANIFEST_BRANCH }}
          **Target:** ${{ github.event.inputs.BUILD_TARGET }}
          **Tree:** [Click Here](${{ github.event.inputs.DEVICE_TREE_URL }}/tree/${{ github.event.inputs.DEVICE_TREE_BRANCH }})
          **Commit:** ${{ env.COMMIT_ID }}
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

